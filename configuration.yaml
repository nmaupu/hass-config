homeassistant:
  # Name of the location where Home Assistant is running
  name: Pasteur
  country: FR
  # Location required to calculate the time the sun rises and sets
  latitude: !secret latitude
  longitude: !secret longitude
  # Impacts weather/sunrise data (altitude above sea level in meters)
  elevation: !secret elevation
  # metric for Metric, imperial for Imperial
  unit_system: metric
  # Pick yours from here: http://en.wikipedia.org/wiki/List_of_tz_database_time_zones
  time_zone: Europe/Paris
  # Customization file
  customize: !include customize.yaml
  #whitelist_external_dirs:
  #  - /data/homeassistant
  #  - /home/homeassistant/maps
  auth_providers:
    - type: homeassistant
    #- type: trusted_networks
    #  trusted_networks:
    #    - 192.168.12.0/24
  auth_mfa_modules:
    - type: totp

websocket_api:

http:
  server_port: 8123
  trusted_proxies:
    - 10.0.0.0/8
    - 192.168.12.0/24
    - 192.168.100.0/24
  use_x_forwarded_for: true
  cors_allowed_origins:
    - https://hass.home.fossar.net:8123
    - https://hass.home.fossar.net


lovelace:
  mode: yaml
  resources:
    - url: /local/template-entity-row/template-entity-row.js
      type: module
    - url: /local/auto-entities/auto-entities.js
      type: module
    - url: /local/custom-header.js
      type: module
    - url: /local/lovelace-cards/tiles-card/tiles-card.js
      type: js
    - url: /local/mini-graph-card-bundle.js
      type: module
    - url: /local/community/lovelace-meteofrance-weather-card/meteofrance-weather-card.js
      type: module
    - url: /local/lovelace-layout-cards/layout-card.js
      type: module

default_config:

frontend:
  themes: !include_dir_merge_named themes/

# Text to speech
tts:
  - platform: google_translate

logger:
  default: info
  logs:
    homeassistant.components.emulated_roku: debug

sun:

prometheus:
  namespace: hass
  filter:
    include_domains:
      - sensor
      - light
      - switch

# See https://www.home-assistant.io/integrations/emulated_roku/
# Used to control hass from Logitech Harmony remote
emulated_roku:
  servers:
    - name: Home Assistant
      host_ip: 0.0.0.0
      listen_port: 8060
      # advertise_ip: Set this to the IP address that your Harmony Hub can reach
      # This should be the routable IP (LoadBalancer IP, node IP, or pod IP if on same network)
      # NOT the ClusterIP (10.106.99.31) which is only reachable within the cluster
      # Examples:
      # - If using LoadBalancer service: use the external IP assigned by MetalLB
      # - If using NodePort: use the node's IP address
      advertise_ip: 192.168.12.40 # underlying k8s node ip
      advertise_port: 8060

# For Alexa discovery, we are now using matterbridge (https://github.com/Luligu/matterbridge)
# on a standalone instance.

script: !include_dir_merge_named scripts/
light: !include_dir_merge_list lights/
sensor: !include_dir_merge_list sensors/
automation: !include automations.yaml
automation mine: !include_dir_merge_list automations/
scene: !include_dir_merge_list scenes/
group: !include groups.yaml
switch: !include_dir_merge_list switches/
climate: !include_dir_merge_list climates/
input_boolean: !include_dir_merge_named input_booleans/
recorder: !include recorder.yaml
